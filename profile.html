<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

<h2>OHA Chat</h2>

<div class="box">

    <div class="profile-avatar" id="profileAvatar"></div>
    <h3 id="profileName"></h3>

    <input type="color" id="colorPicker">
    <p>Color Picker For UserName</p>

    <input type="file" id="avatarUpload">

    <button onclick="saveProfile()">Save</button>
    <button onclick="goBack()">Back</button>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
    // =========================
    // 🔌 SUPABASE
    // =========================
    const sb = window.supabase.createClient(
      "https://jtsivhltrbpishfyhfxl.supabase.co",
      "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP"
    );

    // =========================
    // 👤 USER
    // =========================
    const user = localStorage.getItem("user");

    if (!user) {
      window.location.href = "login.html";
    }

    // =========================
    // 📥 LOAD PROFILE
    // =========================
    async function loadProfile() {

      const { data, error } = await sb
        .from("users")
        .select("avatar_url, color")
        .eq("username", user)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      // 👤 username
      const profileName =
        document.getElementById("profileName");

      profileName.textContent = user;

      // 🎨 color
      if (data?.color) {
        profileName.style.color = data.color;
        document.getElementById("colorPicker").value =
          data.color;
      }

      // 🖼 avatar
      const avatarDiv =
        document.getElementById("profileAvatar");

      avatarDiv.innerHTML = "";

      if (data?.avatar_url) {

        const img = document.createElement("img");
        img.src = data.avatar_url;

        // 🔥 fallback if image breaks
        img.onerror = () => {
          avatarDiv.textContent =
            user.charAt(0).toUpperCase();
        };

        avatarDiv.appendChild(img);

      } else {

        avatarDiv.textContent =
          user.charAt(0).toUpperCase();
      }
    }

    // =========================
    // 💾 SAVE PROFILE
    // =========================
    async function saveProfile() {

      const color =
        document.getElementById("colorPicker").value;

      const file =
        document.getElementById("avatarUpload").files[0];

      let avatarUrl = null;

      // =========================
      // 📷 HANDLE IMAGE
      // =========================
      if (file) {

        // 🔥 size limit
        if (file.size > 5 * 1024 * 1024) {
          alert("Image too large (max 5MB)");
          return;
        }

        // 🔥 safe extension
        const ext =
          file.name.split(".").pop();

        // 🔥 safe username
        const safeUser = user
          .replace(/[^a-z0-9]/gi, "_")
          .toLowerCase();

        const filePath =
          `${safeUser}-${Date.now()}.${ext}`;

        // =========================
        // ⬆️ UPLOAD
        // =========================
        const { error } = await sb.storage
          .from("avatars")
          .upload(filePath, file);

        // 🔴 show real error
        if (error) {
          console.error(error);
          alert(error.message);
          return;
        }

        // =========================
        // 🌍 GET PUBLIC URL
        // =========================
        const { data } = sb.storage
          .from("avatars")
          .getPublicUrl(filePath);

        avatarUrl = data.publicUrl;
      }

      // =========================
      // 💾 UPDATE USER
      // =========================
      const updateData = {
        color
      };

      if (avatarUrl) {
        updateData.avatar_url = avatarUrl;
      }

      const { error: updateError } = await sb
        .from("users")
        .update(updateData)
        .eq("username", user);

      if (updateError) {
        console.error(updateError);
        alert(updateError.message);
        return;
      }

      // =========================
      // 🔄 REFRESH UI
      // =========================
      alert("Profile updated!");

      loadProfile();
    }

    // =========================
    // 🔙 NAV
    // =========================
    function goBack() {
      window.location.href = "index.html";
    }

    // =========================
    // 🚀 START
    // =========================
    loadProfile();
</script>
</body>
</html>
