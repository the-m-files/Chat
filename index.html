<!DOCTYPE html>
<html>
<head>
  <title>OHA Chat</title>
  <link rel="stylesheet" href="chat.css"/>
</head>
<body>

<h2>OHA Chat</h2>

<button onclick="logout()">Logout</button>
<button onclick="goAdmin()">Admin</button>

<div id="messages"></div>

<input type="text" id="message" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  const sb = window.supabase.createClient(
    "https://jtsivhltrbpishfyhfxl.supabase.co",
    "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP"
  );

  const messagesDiv = document.getElementById("messages");
  const input = document.getElementById("message");

  // ⭐ SPECIAL USERS (FIXED POSITION)
  const specialUsers = {
    "lemony !! 🍋 💖": "special",
    "Mahathish": "admin",
    "CoolKid": "rainbow"
  };

  // 🔒 Check login
  const user = localStorage.getItem("user");
  if (!user) {
    window.location.href = "login.html";
  }

  // 🚫 Check if banned
  async function checkIfBanned() {
    const { data } = await sb
      .from("users")
      .select("banned")
      .eq("username", user)
      .single();

    if (data?.banned) {
      alert("You are banned");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }
  }

  checkIfBanned();

  // 📥 Load messages
  async function loadMessages() {
    const { data } = await sb
      .from("oha_chat")
      .select("*")
      .order("created_at", { ascending: true });

    messagesDiv.innerHTML = "";
    data.forEach(renderMessage);

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // 💬 Render message
  function renderMessage(msg) {
    const div = document.createElement("div");
    div.className = "msg";

    const extraClass = specialUsers[msg.name] || "";

    div.innerHTML = `
      <span class="name ${extraClass}">${msg.name}:</span> ${msg.message}
    `;

    messagesDiv.appendChild(div);
  }

  async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  // 🔒 CHECK BAN BEFORE SENDING
  const { data } = await sb
    .from("users")
    .select("banned")
    .eq("username", user)
    .single();

  if (data?.banned) {
    alert("You are banned");
    localStorage.removeItem("user");
    window.location.href = "login.html";
    return;
  }

  await sb.from("oha_chat").insert([
    { name: user, message }
  ]);

  input.value = "";
}
//auto kick when banned
sb.channel("users-watch")
  .on("postgres_changes", {
    event: "UPDATE",
    schema: "public",
    table: "users"
  }, payload => {
    if (payload.new.username === user && payload.new.banned) {
      alert("You have been banned");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }
  })
  .subscribe();
  async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  const { data } = await sb
    .from("users")
    .select("*")
    .eq("username", user)
    .single();

  // ❌ user no longer exists
  if (!data) {
    alert("Account removed");
    localStorage.removeItem("user");
    window.location.href = "login.html";
    return;
  }

  // 🚫 banned
  if (data.banned) {
    alert("You are banned");
    localStorage.removeItem("user");
    window.location.href = "login.html";
    return;
  }

  await sb.from("oha_chat").insert([
    { name: user, message }
  ]);

  input.value = "";
}
  // 🔄 Realtime updates
  sb.channel("chat")
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "oha_chat"
    }, payload => {
      renderMessage(payload.new);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    })
    .subscribe();

  // 🚪 Logout
  function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
  }

  // 👑 Go to admin panel
  function goAdmin() {
    window.location.href = "admin.html";
  }

  // 🚀 Initial load
  loadMessages();

  // 🎯 Focus input
  input.focus();
</script>

</body>
</html>
