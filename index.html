<!DOCTYPE html>
<html>
<head>
  <title>OHA Chat</title>
  <link rel="stylesheet" href="chat.css"/>
</head>
<body>

<h2>OHA Chat</h2>

<button onclick="logout()">Logout</button>
<button onclick="goAdmin()">Admin</button>
<div id="messages"></div>

<input type="text" id="message" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  const sb = window.supabase.createClient(
    "https://jtsivhltrbpishfyhfxl.supabase.co",
    "YOUR_ANON_KEY"
  );

  const messagesDiv = document.getElementById("messages");
  const input = document.getElementById("message");

  // 🔒 Check login
  const user = localStorage.getItem("user");
  if (!user) {
    window.location.href = "login.html";
  }

  // 🚫 Check if banned
  async function checkIfBanned() {
    const { data } = await sb
      .from("users")
      .select("banned")
      .eq("username", user)
      .single();

    if (data?.banned) {
      alert("You are banned");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }
  }

  checkIfBanned();



  // 📥 Load messages
  async function loadMessages() {
    const { data } = await sb
      .from("oha_chat")
      .select("*")
      .order("created_at", { ascending: true });

    messagesDiv.innerHTML = "";
    data.forEach(renderMessage);

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // 💬 Render message
  function renderMessage(msg) {
    const div = document.createElement("div");
    div.className = "msg";

    const extraClass = specialUsers[msg.name] || "";

    div.innerHTML = `
      <span class="name ${extraClass}">${msg.name}:</span> ${msg.message}
    `;

    messagesDiv.appendChild(div);
  }

  // 📤 Send message
  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    await sb.from("oha_chat").insert([
      { name: user, message }
    ]);

    input.value = "";
  }

  // ⌨️ Enter to send
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });

  // 🔄 Realtime updates
  sb.channel("chat")
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "oha_chat"
    }, payload => {
      renderMessage(payload.new);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    })
    .subscribe();

  // 🚪 Logout
  function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
  }

  // 👑 Go to admin panel
  function goAdmin() {
    window.location.href = "admin.html";
  }

  // 🚀 Initial load
  loadMessages();

  // 🎯 Focus input on load
  // IMPORTANT USERS:
  input.focus();
  const specialUsers = {
  "lemony !! 🍋 💖": "special",
  "Mahathish": "admin",
  "CoolKid": "rainbow"
};
</script>

</body>
</html>
