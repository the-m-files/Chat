<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OHA Chat</title>
  <link rel="stylesheet" href="chat.css"/>
</head>
<body>

<div class="container">

  <!-- 🟢 SIDEBAR -->
  <div class="sidebar">
    <h3>Online</h3>
    <div id="onlineUsers"></div>
  </div>

  <!-- 💬 MAIN CHAT -->
  <div class="chat">

    <div class="topbar">
      <h2>OHA Chat</h2>
      <div>
        <button onclick="goProfile()">Profile</button>
        <button onclick="logout()">Logout</button>
        <button onclick="goAdmin()">Admin</button>
      </div>
    </div>

    <div id="messages"></div>
    <div id="typing"></div>

    <div class="inputRow">
      <input type="text" id="message" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  let userCache = {};
  async function loadUsers() {
  const { data } = await sb
    .from("users")
    .select("username, avatar_url, color");

  if (!data) return;

  userCache = {};
  data.forEach(u => {
    userCache[u.username] = u;
  });
}
  // =========================
// 🌍 GLOBAL BUTTON FUNCTIONS (FIX)
// =========================

// 🚪 logout
window.logout = function () {
  localStorage.clear();
  window.location.href = "login.html";
};

// 🛠 admin
window.goAdmin = function () {
  window.location.href = "admin.html";
};

// 👤 profile
window.goProfile = function () {
  window.location.href = "profile.html";
};

// 🌗 theme toggle
window.toggleTheme = function () {
  const current = document.body.getAttribute("data-theme");

  if (current === "light") {
    document.body.setAttribute("data-theme", "dark");
    localStorage.setItem("theme", "dark");
  } else {
    document.body.setAttribute("data-theme", "light");
    localStorage.setItem("theme", "light");
  }
};
const savedTheme = localStorage.getItem("theme") || "dark";
document.body.setAttribute("data-theme", savedTheme);
  document.addEventListener("DOMContentLoaded", () => {

    // =========================
    // 🔌 SUPABASE
    // =========================
    window.sb = window.supabase.createClient(
      "https://jtsivhltrbpishfyhfxl.supabase.co",
      "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP"
    );

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("message");
    const onlineDiv = document.getElementById("onlineUsers");
    const typingDiv = document.getElementById("typing");

    const user = localStorage.getItem("user");
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    // =========================
    // 🔒 SESSION
    // =========================
    let sessionId = localStorage.getItem("sessionId");
    if (!sessionId) {
      sessionId = Math.random().toString(36);
      localStorage.setItem("sessionId", sessionId);
    }

    // =========================
    // 🔒 USER CHECK
    // =========================
    async function checkUserStatus() {
      const { data } = await sb
        .from("users")
        .select("*")
        .eq("username", user)
        .single();

      if (!data || data.banned) {
        alert("Session ended");
        localStorage.clear();
        window.location.href = "login.html";
        return false;
      }
      return true;
    }

    // =========================
    // 💬 RENDER MESSAGE ELEMENT
    // =========================
    async function renderMessageElement(msg) {
      const div = document.createElement("div");
      div.className = "msg";

      const { data } = await sb
        .from("users")
        .select("avatar_url, color")
        .eq("username", msg.name)
        .single();

      const avatar = data?.avatar_url;
      const color = data?.color || "#ffffff";
      const fallback = msg.name.charAt(0).toUpperCase();

      const reactions = msg.reactions || {};

      let reactionHTML = "";
      for (const emoji in reactions) {
        reactionHTML += `
          <span class="reaction" onclick="react('${msg.id}','${emoji}')">
            ${emoji} ${reactions[emoji]}
          </span>
        `;
      }

      const avatarHTML = avatar
        ? `<img src="${avatar}" class="avatar-img">`
        : fallback;

      div.innerHTML = `
        <div style="display:flex; gap:10px; margin-bottom:10px;">

          <div class="avatar">${avatarHTML}</div>

          <div class="msgContent">
            <b style="color:${color}">${msg.name}</b>
            <div>${msg.message}</div>

            <div class="reactions">${reactionHTML}</div>

            <div class="react-buttons">
              <button onclick="react('${msg.id}','👍')">👍</button>
              <button onclick="react('${msg.id}','😂')">😂</button>
              <button onclick="react('${msg.id}','🔥')">🔥</button>
            </div>
          </div>

        </div>
      `;

      // 🔥 safe image fallback (NO SYNTAX BUGS)
      const img = div.querySelector("img");
      if (img) {
        img.onerror = () => {
          img.remove();
          div.querySelector(".avatar").textContent = fallback;
        };
      }

      return div;
    }

    // =========================
    // 💬 LOAD MESSAGES (FAST)
    // =========================
    async function loadMessages() {
      const { data } = await sb
        .from("oha_chat")
        .select("*")
.order("created_at", { ascending: true })
.limit(50)


      if (!data) return;

      const elements = await Promise.all(
        data.map(msg => renderMessageElement(msg))
      );

      messagesDiv.replaceChildren(...elements);

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // =========================
    // 😊 REACTIONS (FIXED)
    // =========================
    window.react = async function (id, emoji) {
      const { data } = await sb
        .from("oha_chat")
        .select("reactions")
        .eq("id", id)
        .single();

      let reactions = data?.reactions || {};

      if (!reactions[emoji]) reactions[emoji] = 0;
      reactions[emoji]++;

      await sb
        .from("oha_chat")
        .update({ reactions })
        .eq("id", id);

setTimeout(loadMessages, 200);
    };

    // =========================
    // 📤 SEND MESSAGE
    // =========================
    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      const ok = await checkUserStatus();
      if (!ok) return;

      await sb.from("oha_chat").insert([
        { name: user, message, reactions: {} }
      ]);

      input.value = "";

      await sb.from("users")
        .update({ typing: false })
        .eq("username", user);
    }

    window.sendMessage = sendMessage;

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });

    // =========================
    // ✍️ TYPING
    // =========================
    let typingTimeout;

    input.addEventListener("input", async () => {
      clearTimeout(typingTimeout);

      await sb.from("users")
        .update({ typing: true })
        .eq("username", user);

      typingTimeout = setTimeout(async () => {
        await sb.from("users")
          .update({ typing: false })
          .eq("username", user);
      }, 1500);
    });

    async function loadTyping() {
      const { data } = await sb
        .from("users")
        .select("username, typing");

      if (!data) return;

      const typingUsers = data
        .filter(u => u.typing && u.username !== user)
        .map(u => u.username);

      typingDiv.textContent =
        typingUsers.length > 0
          ? typingUsers.join(", ") + " is typing..."
          : "";
    }

    // =========================
    // 🟢 ONLINE SYSTEM
    // =========================
    async function updatePresence() {
      await sb
        .from("users")
        .update({
          last_seen: new Date().toISOString(),
          session_id: sessionId
        })
        .eq("username", user);
    }

    async function loadOnlineUsers() {
      const { data } = await sb
        .from("users")
        .select("username, last_seen, session_id");

      if (!data) return;

      const now = Date.now();
      onlineDiv.innerHTML = "";

      data.forEach(u => {
        if (!u.last_seen || !u.session_id) {
          showUser(u.username, false);
          return;
        }

        const diff = now - Date.parse(u.last_seen + "Z");

        const isOnline =
          diff < 2500 &&
          typeof u.session_id === "string" &&
          u.session_id.length > 5;

        showUser(u.username, isOnline);
      });
    }

    function showUser(name, isOnline) {
      const div = document.createElement("div");
      div.textContent = `${isOnline ? "🟢" : "⚫"} ${name}`;
      onlineDiv.appendChild(div);
    }

    // =========================
    // 🧹 FORCE OFFLINE
    // =========================
    window.addEventListener("pagehide", () => {
      navigator.sendBeacon(
        `https://jtsivhltrbpishfyhfxl.supabase.co/rest/v1/users?username=eq.${user}`,
        new Blob([JSON.stringify({
          session_id: null,
          last_seen: null
        })], { type: "application/json" })
      );
    });

    // =========================
    // 🔄 REALTIME
    // =========================
<!--    sb.channel("chat")-->
<!--      .on("postgres_changes", {-->
<!--        event: "*",-->
<!--        schema: "public",-->
<!--        table: "oha_chat"-->
<!--      }, loadMessages)-->
<!--      .subscribe();-->

   sb.channel("chat")
  .on("postgres_changes", {
    event: "INSERT",
    schema: "public",
    table: "oha_chat"
  }, async (payload) => {
    const el = await renderMessageElement(payload.new);
    messagesDiv.appendChild(el);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  })
  .subscribe();


    // =========================
    // 🚀 START
    // =========================
    setInterval(updatePresence, 1000);
    setInterval(loadOnlineUsers, 1200);
    setInterval(loadTyping, 1000);

    updatePresence();
    loadOnlineUsers();
    loadTyping();
    loadMessages();
    input.focus();

  });

  // =========================
  // 📷 AVATAR UPLOAD
  // =========================
  window.uploadAvatar = async function () {
    const user = localStorage.getItem("user");
    const fileInput = document.getElementById("avatarUpload");
    const file = fileInput.files[0];

    if (!file) {
      alert("Pick an image first");
      return;
    }

    const filePath = `${user}-${Date.now()}.png`;

    const { error } = await sb.storage
      .from("avatars")
      .upload(filePath, file);

    if (error) {
      console.error(error);
      alert("Upload failed");
      return;
    }

    const { data } = sb.storage
      .from("avatars")
      .getPublicUrl(filePath);

    await sb
      .from("users")
      .update({ avatar_url: data.publicUrl })
      .eq("username", user);

    alert("Avatar updated!");
    location.reload();
  };
</script>

</body>
</html>
