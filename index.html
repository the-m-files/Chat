<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OHA Chat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 20px auto;
    }

    #messages {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    .msg {
      margin-bottom: 8px;
    }

    .name {
      font-weight: bold;
    }

    input, button {
      padding: 8px;
      margin-top: 5px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>OHA Chat</h2>

<div id="messages"></div>

<input id="name" placeholder="Your name" />
<input id="message" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  console.log("OHA CHAT LOADED CLEANLY");

  // =========================
  // SUPABASE INIT (NO CONFLICT)
  // =========================
  const SUPABASE_URL = "https://jtsivhltrbpishfyhfxl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP";

  // IMPORTANT: use sb instead of supabase to avoid naming collision
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const messagesDiv = document.getElementById("messages");

  // =========================
  // LOAD MESSAGES
  // =========================
  async function loadMessages() {
    const { data, error } = await sb
      .from("oha_chat")
      .select("*")
      .order("created_at", { ascending: true });

    if (error) {
      console.error("Load error:", error);
      return;
    }

    messagesDiv.innerHTML = "";
    data.forEach(renderMessage);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function renderMessage(msg) {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<span class="name">${msg.name}:</span> ${msg.message}`;
    messagesDiv.appendChild(div);
  }

  // =========================
  // SEND MESSAGE
  // =========================
  async function sendMessage() {
    const name = document.getElementById("name").value.trim();
    const message = document.getElementById("message").value.trim();

    if (!name || !message) return;

    const { error } = await sb
      .from("oha_chat")
      .insert([{ name, message }]);

    if (error) {
      console.error("Send error:", error);
      return;
    }

    document.getElementById("message").value = "";
  }

  // =========================
  // REALTIME UPDATES
  // =========================
  sb
    .channel("chat")
    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "oha_chat"
      },
      payload => {
        renderMessage(payload.new);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    )
    .subscribe();

  // =========================
  // INITIAL LOAD
  // =========================
  loadMessages();
</script>

</body>
</html>
