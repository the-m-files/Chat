<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OHA Chat</title>
  <link rel="stylesheet" href="chat.css"/>
</head>
<body>

<div class="container">

  <!-- 🟢 SIDEBAR -->
  <div class="sidebar">
    <h3>Online</h3>
    <div id="onlineUsers"></div>
  </div>

  <!-- 💬 MAIN CHAT -->
  <div class="chat">

    <div class="topbar">
      <h2>OHA Chat</h2>
      <div>
        <button id="profileBtn">Profile</button>
        <button id="logoutBtn">Logout</button>
        <button id="adminBtn">Admin</button>
           <button onclick="window.location.href='solver.html'">
          Open Polynomial Solver
        </button>
      </div>
    </div>

    <div id="messages"></div>
    <div id="typing"></div>

    <div class="inputRow">
      <input type="text" id="message" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>


  document.addEventListener("DOMContentLoaded", async () => {
      let userCache = {};
    // =========================
    // 🔌 SUPABASE
    // =========================
    const sb = window.supabase.createClient(
      "https://jtsivhltrbpishfyhfxl.supabase.co",
      "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP"
    );

    // =========================
    // 📦 DOM
    // =========================
    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("message");
    const onlineDiv = document.getElementById("onlineUsers");
    const typingDiv = document.getElementById("typing");

    // =========================
    // 👤 USER / SESSION
    // =========================
    const user = localStorage.getItem("user");
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    async function cleanupStaleUsers() {
  const cutoff = new Date(Date.now() - 15000).toISOString();

  await sb
    .from("users")
    .update({ session_id: null })
    .lt("last_seen", cutoff);
}
    let sessionId = localStorage.getItem("sessionId");
    if (!sessionId) {
      sessionId = Math.random().toString(36);
      localStorage.setItem("sessionId", sessionId);
    }

    // =========================
    // 🧠 STATE
    // =========================
    const renderedIds = new Set(); // 🔥 FIXED
    let oldestLoadedTime = null;
    let loadingMore = false;

    // =========================
    // 👥 USERS CACHE
    // =========================
   async function loadUsers() {
  const { data } = await sb
    .from("users")
    .select("username, avatar_url, color");

  if (!data) return;

  userCache = {};

  data.forEach(u => {
    const key = (u.username || "").trim().toLowerCase();
    userCache[key] = u;
  });
}
    // =========================
    // 🔒 USER CHECK
    // =========================
    async function checkUserStatus() {
      const { data } = await sb
        .from("users")
        .select("*")
        .eq("username", user)
        .single();

      if (!data || data.banned) {
        localStorage.clear();
        window.location.href = "login.html";
        return false;
      }
      return true;
    }
function formatTime(ts) {
  if (!ts) return "";

  const date = new Date(ts);
  return date.toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });
}
    // =========================
    // 💬 RENDER MESSAGE
    // =========================
    function renderMessageElement(msg) {

      if (renderedIds.has(msg.id)) return null;
      renderedIds.add(msg.id);

      const div = document.createElement("div");
      div.className = "msg";
      div.dataset.id = msg.id;
const key = (msg.name || "").trim().toLowerCase();
const userData = userCache[key] || {};
      const avatar = userData.avatar_url;
      const color = userData.color || "#fff";
      const fallback = msg.name.charAt(0).toUpperCase();

      const reactions = msg.reactions || {};

      let reactionHTML = "";
      for (const emoji in reactions) {
        reactionHTML += `
          <span class="reaction" onclick="react('${msg.id}','${emoji}')">
            ${emoji} ${reactions[emoji]}
          </span>
        `;
      }

      const avatarHTML = avatar
        ? `<img src="${avatar}" class="avatar-img">`
        : fallback;

      div.innerHTML = `
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <div class="avatar">${avatarHTML}</div>
          <div class="msgContent">
            <b style="color:${color}">${msg.name}</b>
<div>${msg.message}</div>

<div class="time">
  ${formatTime(msg.created_at)}
</div>
            <div class="reactions">${reactionHTML}</div>
            <div class="react-buttons">
              <button onclick="react('${msg.id}','👍')">👍</button>
              <button onclick="react('${msg.id}','😂')">😂</button>
              <button onclick="react('${msg.id}','🔥')">🔥</button>
            </div>
          </div>
        </div>
      `;

      const img = div.querySelector("img");
      if (img) {
        img.onerror = () => {
          img.remove();
          div.querySelector(".avatar").textContent = fallback;
        };
      }

      return div;
    }

    // =========================
    // 📥 LOAD INITIAL
    // =========================
    async function loadMessages() {
      renderedIds.clear();

      const { data } = await sb
        .from("oha_chat")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(50);

      if (!data) return;

      const reversed = data.reverse();

      const elements = reversed
        .map(renderMessageElement)
        .filter(Boolean);

      messagesDiv.replaceChildren(...elements);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      oldestLoadedTime = reversed[0]?.created_at || null;
    }

    // =========================
    // ⬆️ LOAD OLDER
    // =========================
    async function loadOlderMessages() {
      if (loadingMore || !oldestLoadedTime) return;
      loadingMore = true;

      const prevHeight = messagesDiv.scrollHeight;

      const { data } = await sb
        .from("oha_chat")
        .select("*")
        .lt("created_at", oldestLoadedTime)
        .order("created_at", { ascending: false })
        .limit(30);

      if (!data || data.length === 0) {
        loadingMore = false;
        return;
      }

      const reversed = data.reverse();

      reversed.forEach(msg => {
        const el = renderMessageElement(msg);
        if (el) messagesDiv.prepend(el);
      });

      messagesDiv.scrollTop =
        messagesDiv.scrollHeight - prevHeight;

      oldestLoadedTime = reversed[0].created_at;
      loadingMore = false;
    }

    messagesDiv.addEventListener("scroll", () => {
      if (messagesDiv.scrollTop < 100) {
        loadOlderMessages();
      }
    });

    // =========================
    // 😊 REACTIONS
    // =========================
    window.react = async (id, emoji) => {
      const { data } = await sb
        .from("oha_chat")
        .select("reactions")
        .eq("id", id)
        .single();

      let reactions = data?.reactions || {};
      reactions[emoji] = (reactions[emoji] || 0) + 1;

      await sb.from("oha_chat")
        .update({ reactions })
        .eq("id", id);
    };

    // =========================
    // 📤 SEND
    // =========================
    window.sendMessage = async () => {
      const message = input.value.trim();
      if (!message) return;

      const ok = await checkUserStatus();
      if (!ok) return;

      await sb.from("oha_chat").insert([
        { name: user, message, reactions: {} }
      ]);

      input.value = "";

      await sb.from("users")
        .update({ typing: false })
        .eq("username", user);
    };

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });
    let typingTimeout;
let isTyping = false;

input.addEventListener("input", () => {
  if (!isTyping) {
    isTyping = true;
    sb.from("users")
      .update({ typing: true })
      .eq("username", user);
  }

  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    isTyping = false;
    sb.from("users")
      .update({ typing: false })
      .eq("username", user);
  }, 1500);
});

async function loadTyping() {
  const { data } = await sb
    .from("users")
    .select("username, typing");

  if (!data) return;

  const typingUsers = data
    .filter(u => u.typing && u.username !== user)
    .map(u => u.username);

  typingDiv.textContent =
    typingUsers.length > 0
      ? typingUsers.join(", ") + " is typing..."
      : "";
}
async function updatePresence() {
  await sb
    .from("users")
    .update({
      last_seen: new Date().toISOString(),
      session_id: sessionId
    })
    .eq("username", user);
}

 async function loadOnlineUsers() {
  const { data } = await sb
    .from("users")
    .select("username, last_seen, session_id");

  if (!data) return;

  const now = Date.now();
  onlineDiv.innerHTML = "";

  data.forEach(u => {
    const lastSeen = new Date(u.last_seen || 0).getTime();

    const isOnline =
      u.session_id === sessionId &&
      u.last_seen &&
      (now - lastSeen) < 8000;

    const div = document.createElement("div");
    div.textContent = `${isOnline ? "🟢" : "⚫"} ${u.username}`;
    onlineDiv.appendChild(div);
  });
}
document.getElementById("logoutBtn").onclick = () => {
  localStorage.clear();
  window.location.href = "login.html";
};

document.getElementById("adminBtn").onclick = () => {
  window.location.href = "admin.html";
};

document.getElementById("profileBtn").onclick = () => {
  window.location.href = "profile.html";
};
function showUser(name, isOnline) {
  const div = document.createElement("div");
  div.textContent = `${isOnline ? "🟢" : "⚫"} ${name}`;
  onlineDiv.appendChild(div);
}
    // =========================
    // 🔄 REALTIME
    // =========================
    sb.channel("chat")
      .on("postgres_changes", {
        event: "INSERT",
        schema: "public",
        table: "oha_chat"
      }, (payload) => {
        const el = renderMessageElement(payload.new);
        if (!el) return;

        messagesDiv.appendChild(el);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      })
      .subscribe();
if (localStorage.getItem("profileUpdated")) {
  localStorage.removeItem("profileUpdated");
  loadUsers(); // refresh avatar cache
}
    // =========================
    // 🚀 START
    // =========================
    await loadUsers();

await loadMessages(); // ONLY ONCE

updatePresence();
loadOnlineUsers();
loadTyping();

setInterval(updatePresence, 3000);
setInterval(loadOnlineUsers, 2000);
setInterval(loadTyping, 1000);

cleanupStaleUsers();
input.focus();
 window.addEventListener("pagehide", () => {
  navigator.sendBeacon(
    `https://jtsivhltrbpishfyhfxl.supabase.co/rest/v1/users?username=eq.${user}`,
    new Blob([JSON.stringify({
      session_id: null,
      last_seen: null
    })], { type: "application/json" })
  );
});
  });

</script>
</body>
</html>
