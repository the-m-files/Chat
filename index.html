<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Chat</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
    }

    #chat {
      height: 400px;
      overflow-y: scroll;
      border: 1px solid #ccc;
      padding: 10px;
    }

    input {
      width: 75%;
      padding: 5px;
    }

    button {
      padding: 5px 10px;
    }
  </style>
</head>

<body>

<h2>Chat</h2>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* =========================
   1. SUPABASE SETUP
========================= */

const supabaseUrl = "https://jtsivhltrbpishfyhfxl.supabase.co";
const supabaseKey = "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP";

const supabase = createClient(supabaseUrl, supabaseKey);

/* =========================
   2. USERNAME
========================= */

let name = prompt("Enter your name:");
if (!name) name = "Anonymous";

/* =========================
   3. LOAD MESSAGES
========================= */

async function loadMessages() {
  const { data, error } = await supabase
    .from("message")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(m => {
    chat.innerHTML += `<p><b>${m.name}:</b> ${m.message}</p>`;
  });

  chat.scrollTop = chat.scrollHeight;
}

/* =========================
   4. SEND MESSAGE
========================= */

window.send = async function () {
  const msgInput = document.getElementById("msg");
  const msg = msgInput.value;

  if (!msg) return;

  const { error } = await supabase
    .from("messages")
    .insert([{ name: name, message: msg }]);

  if (error) {
    console.error(error);
    return;
  }

  msgInput.value = "";
  loadMessages();
};

/* =========================
   5. AUTO REFRESH
========================= */

loadMessages();
setInterval(loadMessages, 2000);

</script>

</body>
</html>
