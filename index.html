<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OHA Chat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 20px auto;
    }

    #messages {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    .msg {
      margin-bottom: 8px;
    }

    .name {
      font-weight: bold;
    }

    input, button {
      padding: 8px;
      margin-top: 5px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

<h2>OHA Chat</h2>

<div id="messages"></div>

<input id="name" placeholder="Your name" />
<input id="message" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 🔧 Supabase config (replace anon key)
  const SUPABASE_URL = "https://jtsivhltrbpishfyhfxl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const messagesDiv = document.getElementById("messages");

  // Load messages
  async function loadMessages() {
    const { data, error } = await supabase
      .from("oha_chat")
      .select("*")
      .order("created_at", { ascending: true });

    if (error) {
      console.error(error);
      return;
    }

    messagesDiv.innerHTML = "";
    data.forEach(addMessage);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function addMessage(msg) {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<span class="name">${msg.name}:</span> ${msg.message}`;
    messagesDiv.appendChild(div);
  }

  // Send message
  async function sendMessage() {
    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    if (!name || !message) return;

    const { error } = await supabase
      .from("oha_chat")
      .insert([{ name, message }]);

    if (error) {
      console.error(error);
    } else {
      document.getElementById("message").value = "";
    }
  }

  // Realtime updates
  supabase
    .channel("chat")
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "oha_chat" },
      payload => addMessage(payload.new)
    )
    .subscribe();

  loadMessages();
</script>

</body>
</html>
