<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OHA Chat</title>
  <link rel="stylesheet" href="chat.css"/>
</head>
<body>

<div class="container">

  <!-- 🟢 SIDEBAR -->
  <div class="sidebar">
    <h3>Online</h3>
    <div id="onlineUsers"></div>
  </div>

  <!-- 💬 MAIN CHAT -->
  <div class="chat">

    <div class="topbar">
      <h2>OHA Chat</h2>
      <div>
        <button onclick="logout()">Logout</button>
        <button onclick="goAdmin()">Admin</button>
      </div>
    </div>

    <div id="messages"></div>

    <div class="inputRow">
      <input type="text" id="message" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

</body>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {

    const sb = window.supabase.createClient(
      "https://jtsivhltrbpishfyhfxl.supabase.co",
      "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP"
    );

    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("message");
    const onlineDiv = document.getElementById("onlineUsers");

    if (!messagesDiv || !input || !onlineDiv) return;

    const user = localStorage.getItem("user");
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    // ⭐ Special users
    const specialUsers = {
      "lemony !! 🍋 💖": "special",
      "Mahathish": "admin",
      "CoolKid": "rainbow"
    };

    // =========================
    // 🔒 USER CHECK
    // =========================
    async function checkUserStatus() {
      const { data } = await sb
        .from("users")
        .select("*")
        .eq("username", user)
        .single();

      if (!data || data.banned) {
        alert("Session ended");
        localStorage.removeItem("user");
        window.location.href = "login.html";
        return false;
      }
      return true;
    }

    // =========================
    // 💬 MESSAGES
    // =========================
    async function loadMessages() {
      const { data } = await sb
        .from("oha_chat")
        .select("*")
        .order("created_at", { ascending: true });

      if (!data) return;

      messagesDiv.innerHTML = "";
      data.forEach(renderMessage);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function renderMessage(msg) {
      const div = document.createElement("div");
      const extra = specialUsers[msg.name] || "";

      div.innerHTML = `
        <span class="name ${extra}">${msg.name}:</span> ${msg.message}
      `;

      messagesDiv.appendChild(div);
    }

    function addSystemMessage(text) {
      const div = document.createElement("div");
      div.className = "system";
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // =========================
    // 📤 SEND MESSAGE
    // =========================
    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      const ok = await checkUserStatus();
      if (!ok) return;

      await sb.from("oha_chat").insert([
        { name: user, message }
      ]);

      input.value = "";
    }

    window.sendMessage = sendMessage;

    // ⌨️ ENTER KEY
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });

    // =========================
    // 🟢 ONLINE SYSTEM (FAST)
    // =========================
    let userStatusMap = {};
    let firstLoad = true;

    async function updateLastSeen() {
      await sb
        .from("users")
        .update({ last_seen: new Date().toISOString() })
        .eq("username", user);
    }

    async function loadOnlineUsers() {
      const { data } = await sb
        .from("users")
        .select("username, last_seen");

      if (!data) return;

      const now = Date.now();
      onlineDiv.innerHTML = "";

      data.forEach(u => {
        const last = u.last_seen ? new Date(u.last_seen).getTime() : 0;
        const isOnline = (now - last) < 4000;

        const wasOnline = userStatusMap[u.username];

        // 🚫 Skip spam on first load
        if (!firstLoad) {
          if (isOnline && !wasOnline) {
            addSystemMessage(`🟢 ${u.username} joined the chat`);
          }
          if (!isOnline && wasOnline) {
            addSystemMessage(`🔴 ${u.username} left the chat`);
          }
        }

        userStatusMap[u.username] = isOnline;

        const div = document.createElement("div");
        div.textContent = `${isOnline ? "🟢" : "⚫"} ${u.username}`;
        onlineDiv.appendChild(div);
      });

      firstLoad = false;
    }

    // 🔥 Activity-based updates (IMPORTANT)
    document.addEventListener("mousemove", updateLastSeen);
    document.addEventListener("keydown", updateLastSeen);

    // =========================
    // 🔄 REALTIME
    // =========================
    sb.channel("chat")
      .on("postgres_changes", {
        event: "*",
        schema: "public",
        table: "oha_chat"
      }, loadMessages)
      .subscribe();

    sb.channel("users-watch")
      .on("postgres_changes", {
        event: "*",
        schema: "public",
        table: "users"
      }, payload => {
        if (payload.new?.username === user) {
          alert("Session ended");
          localStorage.removeItem("user");
          window.location.href = "login.html";
        }
      })
      .subscribe();

    // =========================
    // 🚪 GLOBAL BUTTONS
    // =========================
    window.logout = function () {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    };

    window.goAdmin = function () {
      window.location.href = "admin.html";
    };

    // =========================
    // 🚀 START
    // =========================
    setInterval(updateLastSeen, 2000);
    setInterval(loadOnlineUsers, 2000);

    updateLastSeen();
    loadOnlineUsers();
    loadMessages();

    input.focus();

  });
</script>
</html>
