<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OHA Chat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 20px auto;
    }

    #messages {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    .msg {
      margin-bottom: 8px;
    }

    .name {
      font-weight: bold;
    }

    input, button {
      padding: 8px;
      margin-top: 5px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>OHA Chat</h2>

<button onclick="logout()">Logout</button>

<div id="messages"></div>

<input id="message" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  console.log("OHA Chat Secure v2");

  const SUPABASE_URL = "https://jtsivhltrbpishfyhfxl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const messagesDiv = document.getElementById("messages");

  // =========================
  // AUTH CHECK (protect page)
  // =========================
  async function checkUser() {
    const { data: { user } } = await sb.auth.getUser();

    if (!user) {
      window.location.href = "login.html";
      return null;
    }

    return user;
  }

  // =========================
  // LOAD MESSAGES
  // =========================
  async function loadMessages() {
    const { data, error } = await sb
      .from("oha_chat")
      .select("*")
      .order("created_at", { ascending: true });

    if (error) {
      console.error("Load error:", error);
      return;
    }

    messagesDiv.innerHTML = "";
    data.forEach(renderMessage);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function renderMessage(msg) {
    const div = document.createElement("div");
    div.className = "msg";

    // Show shortened user_id (temporary display)
    const shortId = msg.user_id ? msg.user_id.slice(0, 6) : "unknown";

    div.innerHTML = `<span class="name">${shortId}:</span> ${msg.message}`;
    messagesDiv.appendChild(div);
  }

  // =========================
  // SEND MESSAGE (SECURE)
  // =========================
  async function sendMessage() {
    const message = document.getElementById("message").value.trim();
    const user = await checkUser();

    if (!message || !user) return;

    const { error } = await sb
      .from("oha_chat")
      .insert([
        {
          message,
          user_id: user.id
        }
      ]);

    if (error) {
      console.error("Send error:", error);
      return;
    }

    document.getElementById("message").value = "";
  }

  // =========================
  // REALTIME UPDATES
  // =========================
  sb.channel("chat")
    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "oha_chat"
      },
      payload => {
        renderMessage(payload.new);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    )
    .subscribe();

  // =========================
  // LOGOUT
  // =========================
  async function logout() {
    await sb.auth.signOut();
    window.location.href = "login.html";
  }

  // =========================
  // INIT
  // =========================
  (async () => {
    const user = await checkUser();
    if (!user) return;

    loadMessages();
  })();

</script>

</body>
</html>
