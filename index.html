<!DOCTYPE html>
<html>
<head>
  <title>OHA Chat</title>
  <link rel="stylesheets" href="Chat/index.css">
</head>
<body>

<h2>OHA Chat</h2>

<button onclick="logout()">Logout</button>

<div id="messages"></div>

<input id="message" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const sb = window.supabase.createClient(
  "https://jtsivhltrbpishfyhfxl.supabase.co",
  "sb_publishable_K6rHpM-Xy26NF3nlYf7Czg_2mgceKkP"
);

const messagesDiv = document.getElementById("messages");

// 🔒 Check login
const user = localStorage.getItem("user");
if (!user) {
  window.location.href = "login.html";
}

// Load messages
async function loadMessages() {
  const { data } = await sb
    .from("oha_chat")
    .select("*")
    .order("created_at", { ascending: true });

  messagesDiv.innerHTML = "";
  data.forEach(renderMessage);
}

// Render message
function renderMessage(msg) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<span class="name">${msg.name}:</span> ${msg.message}`;
  messagesDiv.appendChild(div);
}

// Send message
async function sendMessage() {
  const message = document.getElementById("message").value;
  if (!message) return;

  await sb.from("oha_chat").insert([
    { name: user, message }
  ]);

  document.getElementById("message").value = "";
}

// Realtime
sb.channel("chat")
  .on("postgres_changes", {
    event: "INSERT",
    schema: "public",
    table: "oha_chat"
  }, payload => {
    renderMessage(payload.new);
  })
  .subscribe();

// Logout
function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

// Init
loadMessages();
</script>

</body>
</html>
