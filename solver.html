<!DOCTYPE html>
<html>
<head>
    <title>Polynomial Solver</title>
<link rel="stylesheet" href="chat.css">
</head>
<body>

<div class="solverPage">

    <div class="solverTopbar">
        Polynomial Solver
    </div>

    <div class="solverContent">

        <div class="solverBox">

            <p>
                Enter coefficients separated by spaces.
            </p>

            <div class="solverExample">
                Example: 2 -3 -8 12
            </div>

            <input
                    id="coeffs"
                    placeholder="Enter coefficients..."
            >

            <button onclick="solve()">
                Solve
            </button>

            <div id="output"></div>

        </div>

    </div>

</div>
<script>
    function gcd(a, b) {
        while (b !== 0) {
            let t = b;
            b = a % b;
            a = t;
        }
        return Math.abs(a);
    }

    function simplifyFraction(n, d) {

        let g = gcd(n, d);

        return {
            n: n / g,
            d: d / g
        };
    }

    function factors(n) {

        n = Math.abs(n);

        let result = [];

        for (let i = 1; i <= Math.sqrt(n); i++) {

            if (n % i === 0) {

                result.push(i);

                if (i !== n / i) {
                    result.push(n / i);
                }
            }
        }

        return result;
    }

    function evaluate(coeffs, x) {

        // Horner's Method
        let result = coeffs[0];

        for (let i = 1; i < coeffs.length; i++) {
            result = result * x + coeffs[i];
        }

        return result;
    }


function syntheticDivide(coeffs, root) {

    let result = [coeffs[0]];

    for (let i = 1; i < coeffs.length; i++) {

        result[i] =
            coeffs[i] +
            result[i - 1] * root;
    }

    result.pop(); // remove remainder

    return result;
}

function rationalRoots(coeffs) {

    let roots = [];

    while (coeffs.length > 1) {

        let leading = coeffs[0];
        let constant = coeffs[coeffs.length - 1];

        let pFactors = factors(constant);
        let qFactors = factors(leading);

        let found = false;

        for (let p of pFactors) {

            for (let q of qFactors) {

                for (let sign of [1, -1]) {

                    let root =
                        (sign * p) / q;

                    let val =
                        evaluate(coeffs, root);

                    if (Math.abs(val) < 0.0000001) {

                        roots.push(root);

                        // divide polynomial
                        coeffs =
                            syntheticDivide(
                                coeffs,
                                root
                            );

                        found = true;

                        break;
                    }
                }

                if (found) break;
            }

            if (found) break;
        }

        if (!found) break;
    }

    return roots;
}

    function solve() {

        let input =
            document
            .getElementById("coeffs")
            .value
            .trim();

        let coeffs =
            input
            .split(/\s+/)
            .map(Number);

        let output =
            document
            .getElementById("output");

        if (
            coeffs.length < 2 ||
            coeffs.some(isNaN)
        ) {
            output.innerHTML =
                "Invalid coefficients.";
            return;
        }

        let roots =
            rationalRoots(coeffs);

        if (roots.length === 0) {

            output.innerHTML =
                "No rational roots found.";

            return;
        }

        output.innerHTML =
            "<b>Roots:</b><br>" +
            roots.map(r => "x = " + r)
                 .join("<br>");
    }
</script>

</body>
</html>
